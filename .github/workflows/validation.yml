name: Repository validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-validation:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check committed diff whitespace
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            git diff --check "origin/$env:GITHUB_BASE_REF...HEAD"
          } else {
            git diff --check "$env:GITHUB_SHA^" "$env:GITHUB_SHA"
          }

      - name: Scan tracked files for private data
        shell: pwsh
        run: .\scripts\Test-PrivateDataScan.ps1 -Scope AllTracked

      - name: Check stale handoffs
        shell: pwsh
        run: .\scripts\Test-StaleHandoffs.ps1

      - name: Check Confluence page families
        shell: pwsh
        run: .\scripts\Test-ConfluencePageFamilyConsistency.ps1

      - name: Parse JSON schemas
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath schemas -Filter *.json | ForEach-Object {
            Get-Content -Raw -LiteralPath $_.FullName | ConvertFrom-Json | Out-Null
            Write-Host "Validated $($_.Name)"
          }

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Include *.ps1 -Path scripts, .claude/hooks | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $failed = $true
              Write-Host "PARSE ERRORS in $($_.FullName):"
              $parseErrors | ForEach-Object { Write-Host "  $($_.Message)" }
            }
            else {
              Write-Host "Parsed $($_.Name)"
            }
          }
          if ($failed) { exit 1 }

      - name: Run Deny-SecretRead hook offline suite
        shell: pwsh
        run: .\scripts\Test-DenySecretReadHook.ps1
